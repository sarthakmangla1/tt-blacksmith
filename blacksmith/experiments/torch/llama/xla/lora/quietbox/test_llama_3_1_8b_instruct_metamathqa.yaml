# Dataset settings
dataset_id: "metamathqa"

# Model settings
model_name: "meta-llama/Llama-3.1-8B-Instruct"
max_length: 256
dtype: "torch.bfloat16"

# Training hyperparameters
training_type: "lora"
learning_rate: 1e-4
batch_size: 2
gradient_accumulation_steps: 8
num_epochs: 1
ignored_index: -100

# LoRA setup
lora_r: 4
lora_alpha: 8
lora_target_modules: ["q_proj", "v_proj"]
lora_task_type: "CAUSAL_LM"

# Device settings
mesh_shape: [2, 4]  # Wormhole QuietBox mesh.
mesh_axis_names: ["data", "model"]
input_sharding_dim: "data"
# Sharding patterns for tensor parallelism (regex pattern -> partition spec)
model_sharding_patterns:
  # === Attention ===
  - ['\.self_attn\.q_proj\.base_layer$',      ["model", null]]
  - ['\.self_attn\.q_proj\.lora_B\.default$', ["model", null]]
  - ['\.self_attn\.k_proj$',                  ["model", null]]
  - ['\.self_attn\.v_proj\.base_layer$',      ["model", null]]
  - ['\.self_attn\.v_proj\.lora_B\.default$', ["model", null]]
  - ['\.self_attn\.o_proj$',                  [null, "model"]]
  # === MLP ===
  - ['\.mlp\.gate_proj$', ["model", null]]
  - ['\.mlp\.up_proj$',   ["model", null]]
  - ['\.mlp\.down_proj$', [null, "model"]]

# Reproducibility settings
seed: 23
deterministic: False

# Logging settings
log_level: "INFO"
use_wandb: True
wandb_project: "llama8b-instruct-lora-quietbox"
wandb_run_name: "tt-llama8b-instruct-metamathqa-test"
wandb_tags: ["test"]
wandb_watch_mode: "all"
wandb_log_freq: 1000
model_to_wandb: False
steps_freq: 10
val_steps_freq: 100
epoch_freq: 1

# Checkpoint settings
resume_from_checkpoint: False
resume_option: "last"  # [last, best, path]
checkpoint_path: "" # path to checkpoint if resume_option is "path"
checkpoint_metric: "eval/loss"
checkpoint_metric_mode: "min"  # [min, max]
keep_last_n: 2
keep_best_n: 1
save_strategy: "step"
project_dir: "blacksmith/experiments/torch/llama/xla/lora"
save_optim: True
storage_backend: "local"
sync_to_storage: False
load_from_storage: False
remote_path: ""

# Other settings
framework: "pytorch"
print_examples: True
use_tt: True
