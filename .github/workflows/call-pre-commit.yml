name: Pre-commit

on:
  workflow_dispatch:
  workflow_call:

jobs:
  pre-commit:

    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
      - name: Run pre-commit
        shell: bash
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install pre-commit
          pre-commit run --all-files --show-diff-on-failure
